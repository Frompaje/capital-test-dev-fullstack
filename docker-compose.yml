services:
  postgres:
    image: postgres:16-alpine
    container_name: capital_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-capital_db}
      POSTGRES_USER: ${DB_USERNAME:-capital_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-capital_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-capital_user} -d ${DB_DATABASE:-capital_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - capital_network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: capital_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - capital_network
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-capital_db}
      DB_USERNAME: ${DB_USERNAME:-capital_user}
      DB_PASSWORD: ${DB_PASSWORD:-capital_pass}
      APP_URL: http://localhost:${APP_PORT:-8000}

  nginx:
    image: nginx:alpine
    container_name: capital_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - capital_network

  frontend:
    image: node:22-alpine
    container_name: capital_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:8000/api}
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - capital_network

volumes:
  postgres_data:

networks:
  capital_network:
    driver: bridge
